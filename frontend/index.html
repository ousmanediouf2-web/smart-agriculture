<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2e7d32" />
    <meta name="description" content="Plateforme IoT de monitoring agricole intelligent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AgroSmart" />
    <title>AgroSmart — Agriculture Intelligente</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      // Désinscrire TOUS les service workers pour éviter les problèmes de cache
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var r of registrations) {
            r.unregister();
            console.log('SW désinscrit:', r.scope);
          }
        });
        // Vider tous les caches
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (var name of names) {
              caches.delete(name);
              console.log('Cache supprimé:', name);
            }
          });
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
