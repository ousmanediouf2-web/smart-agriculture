services:
  # Backend Node.js
  - type: web
    name: smart-agriculture-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install && (pip3 install Pillow numpy opencv-python-headless --break-system-packages -q 2>/dev/null || pip install Pillow numpy opencv-python-headless -q 2>/dev/null || true)
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: TELEGRAM_BOT_TOKEN
        sync: false   # Token du bot Telegram (obtenu via @BotFather)
      - key: ADMIN_TELEGRAM_CHAT_ID
        sync: false   # Chat ID Telegram de l'administrateur
      - key: INIT_SECRET
        generateValue: true
      - key: ESP32_API_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: SENTINEL_INSTANCE_ID
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: WEBODM_API_KEY
        sync: false

  # Frontend React (Static Site)
  - type: web
    name: smart-agriculture-frontend
    env: static
    region: frankfurt
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*.js
        name: Content-Type
        value: application/javascript
      - path: /assets/*.css
        name: Content-Type
        value: text/css
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
